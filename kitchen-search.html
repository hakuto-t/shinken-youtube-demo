<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&Livin キッチン検索ツール</title>
<style>
  :root {
    --bg: #f5f4f0;
    --white: #ffffff;
    --border: #e0ddd6;
    --text: #2c2c2c;
    --text-sub: #888;
    --accent: #3a5a40;
    --accent-light: #e8f0e9;
    --tag-bg: #f0ede8;
    --shadow: 0 2px 8px rgba(0,0,0,0.07);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* Header */
  .header { background: var(--accent); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.05em; }
  .header .subtitle { font-size: 11px; opacity: 0.75; }
  .search-wrap { margin-left: auto; position: relative; }
  .search-wrap input { width: 220px; padding: 7px 14px 7px 34px; border: none; border-radius: 20px; background: rgba(255,255,255,0.2); color: white; font-size: 13px; outline: none; }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.65); }
  .search-wrap::before { content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; }
  .result-count { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 3px 10px; font-size: 12px; white-space: nowrap; }

  /* Layout */
  .layout { display: flex; gap: 0; min-height: calc(100vh - 53px); }

  /* Sidebar */
  .sidebar { width: 220px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); padding: 16px 14px; overflow-y: auto; position: sticky; top: 53px; height: calc(100vh - 53px); }
  .filter-group { margin-bottom: 18px; }
  .filter-group h3 { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .filter-btn { display: block; width: 100%; text-align: left; padding: 5px 9px; margin-bottom: 3px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { background: var(--tag-bg); border-color: #ccc; }
  .filter-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .filter-btn .count { float: right; color: var(--text-sub); font-size: 11px; }
  .filter-btn.active .count { color: var(--accent); opacity: 0.7; }
  .clear-btn { display: block; width: 100%; padding: 7px; background: #f5e9e9; border: 1px solid #e0b0b0; border-radius: 6px; color: #c0392b; font-size: 12px; cursor: pointer; text-align: center; font-weight: 600; margin-top: 4px; }
  .clear-btn:hover { background: #f0d5d5; }

  .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.15); margin-right: 5px; vertical-align: middle; flex-shrink: 0; }

  /* Main content */
  .main { flex: 1; padding: 16px 18px; overflow-y: auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

  /* Cards */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 15px; box-shadow: var(--shadow); transition: box-shadow 0.2s, transform 0.15s; cursor: default; position: relative; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .card-name { font-size: 15px; font-weight: 700; flex: 1; }
  .style-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; }
  .style-COZY  { background: #fde8d8; color: #c0522a; }
  .style-LOHAS { background: #d8f0de; color: #2a7a40; }
  .style-NERO  { background: #e0e0e0; color: #333; }
  .style-VILLA { background: #dde8f8; color: #2a4a8a; }

  .info-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .label { font-size: 10px; color: var(--text-sub); background: var(--tag-bg); padding: 1px 6px; border-radius: 4px; white-space: nowrap; }

  .kitchen-block { background: var(--bg); border-radius: 8px; padding: 9px 11px; margin: 8px 0; }
  .kitchen-maker { font-size: 11px; color: var(--text-sub); margin-bottom: 3px; }
  .kitchen-name { font-size: 13px; font-weight: 700; margin-bottom: 5px; line-height: 1.4; }
  .kitchen-price { font-size: 12px; color: #555; }

  .color-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .color-chip { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.12); flex-shrink: 0; }
  .color-name { font-size: 12px; font-weight: 600; }

  .detail-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .detail-tag { font-size: 11px; background: var(--tag-bg); border-radius: 4px; padding: 2px 7px; color: #555; }
  .detail-tag.has-value { background: #e8f0e9; color: #2a5a30; }
  .detail-tag.price-tag { background: #fdf6e8; color: #7a5a10; }

  /* No results */
  .no-results { text-align: center; color: var(--text-sub); padding: 60px 20px; grid-column: 1/-1; }
  .no-results .icon { font-size: 40px; margin-bottom: 12px; }

  /* Active filter chips */
  .active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
  .active-chip { background: var(--accent-light); border: 1px solid var(--accent); color: var(--accent); border-radius: 12px; padding: 3px 10px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .active-chip button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; padding: 0; line-height: 1; }

  /* PDF buttons */
  .pdf-links { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .pdf-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 6px; font-size: 11px; font-weight: 600; text-decoration: none; cursor: pointer; transition: all 0.15s; }
  .pdf-btn-plan { background: #e8eeff; color: #2a44a0; border: 1px solid #b8c8f0; }
  .pdf-btn-plan:hover { background: #d0daff; }
  .pdf-btn-storage { background: #fff0e0; color: #a06020; border: 1px solid #f0d0a0; }
  .pdf-btn-storage:hover { background: #ffe0c0; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="header">
  <div>

  <!-- Main -->
  <div class="main">
    <div class="active-filters" id="activeFilters"></div>
    <div class="grid" id="grid"></div>
  </div>
</div>

// Filter state
let filters = { maker: null, kType: null, color: null, style: null, size: null, oneroom: false, garage: false };

function getMakerLabel(m) { return m; }

function buildFilters() {
  const groups = [
    { key: 'maker', elId: 'makerFilters', values: [...new Set(data.map(d => d.maker).filter(Boolean))] },
    { key: 'kType', elId: 'typeFilters', values: [...new Set(data.map(d => d.kType).filter(Boolean))] },
    { key: 'color', elId: 'colorFilters', values: [...new Set(data.map(d => d.color).filter(Boolean))] },
    { key: 'style', elId: 'styleFilters', values: ['COZY','LOHAS','NERO','VILLA'] },
    { key: 'size', elId: 'sizeFilters', values: [...new Set(data.map(d => d.size).filter(Boolean))].sort((a,b)=>{const n=s=>parseFloat(s);return n(a)-n(b);}) },
  ];
  groups.forEach(({ key, elId, values }) => {
    const el = document.getElementById(elId);
    el.innerHTML = '';
    values.forEach(v => {
      const cnt = data.filter(d => d[key] === v).length;
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.key = key;
      btn.dataset.val = v;
      btn.onclick = () => toggleFilter(key, v);
      if (key === 'color') {
        const dot = `<span class="color-dot" style="background:${colorMap[v]||'#ccc'}"></span>`;
        btn.innerHTML = `${dot}${v} <span class="count">${cnt}</span>`;
      } else {
        btn.innerHTML = `${v} <span class="count">${cnt}</span>`;
      }
      el.appendChild(btn);
    });
  });

  // Special counts
  document.getElementById('cnt-oneroom').textContent = data.filter(d=>d.hasOneroom).length;
  document.getElementById('cnt-garage').textContent  = data.filter(d=>d.hasGarage).length;
}

function toggleFilter(key, val) {
  filters[key] = filters[key] === val ? null : val;
  applyFilters();
  updateFilterBtns();
}

function toggleSpecial(key) {
  filters[key] = !filters[key];
  document.getElementById('btn-' + key).classList.toggle('active', filters[key]);
  applyFilters();
  updateActiveChips();
}

function clearAll() {
  filters = { maker: null, kType: null, color: null, style: null, size: null, oneroom: false, garage: false };
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  applyFilters();
  updateActiveChips();
}

function updateFilterBtns() {
  document.querySelectorAll('.filter-btn[data-key]').forEach(btn => {
    btn.classList.toggle('active', filters[btn.dataset.key] === btn.dataset.val);
  });
  updateActiveChips();
}

function updateActiveChips() {
  const el = document.getElementById('activeFilters');
  const chips = [];
  const labels = { maker:'メーカー', kType:'型', color:'扉カラー', style:'スタイル', size:'サイズ' };
  Object.entries(labels).forEach(([key, label]) => {
    if (filters[key]) chips.push({ key, label: `${label}: ${filters[key]}` });
  });
  if (filters.oneroom) chips.push({ key:'oneroom', label:'ワンルームあり' });
  if (filters.garage)  chips.push({ key:'garage',  label:'ガレージあり' });
  el.innerHTML = chips.map(c =>
    `<span class="active-chip">${c.label} <button onclick="removeChip('${c.key}')">×</button></span>`
  ).join('');
}

function removeChip(key) {
  if (key === 'oneroom' || key === 'garage') { filters[key] = false; document.getElementById('btn-'+key).classList.remove('active'); }
  else filters[key] = null;
  applyFilters();
  updateFilterBtns();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = data.filter(d => {
    if (q && !d.name.toLowerCase().includes(q)) return false;
    if (filters.maker  && d.maker  !== filters.maker)  return false;
    if (filters.kType  && d.kType  !== filters.kType)  return false;
    if (filters.color  && d.color  !== filters.color)  return false;
    if (filters.style  && d.style  !== filters.style)  return false;
    if (filters.size   && d.size   !== filters.size)   return false;
    if (filters.oneroom && !d.hasOneroom) return false;
    if (filters.garage  && !d.hasGarage)  return false;
    return true;
  });
  document.getElementById('countBadge').textContent = `${filtered.length} 件`;
  renderCards(filtered);
}

function renderCards(list) {
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="no-results"><div class="icon">🔍</div><p>該当するお客様が見つかりませんでした</p></div>`;
    return;
  }
  grid.innerHTML = list.map(d => {
    const colorBg = colorMap[d.color] || '#e0e0e0';
    const colorDot = d.color
      ? `<span class="color-chip" style="background:${colorBg};border-color:${d.color.includes('ホワイト')||d.color==='ホワイト'?'#bbb':'rgba(0,0,0,0.15)'}"></span><span class="color-name">${d.color}</span>`
      : `<span style="font-size:12px;color:#aaa">カラー未登録</span>`;

    const kitchenDisplay = d.kitchen || '—';
    const makerBadge = d.maker ? `<span class="label">${d.maker}</span>` : '';
    const typeBadge  = d.kType ? `<span class="label">${d.kType}</span>` : '';
    const noteBadge  = d.kNote ? `<span class="label">${d.kNote}</span>` : '';

    const backNum = parseFloat((d.backStorage||'').replace(/[^0-9]/g,''));
    const backTag = backNum > 0 ? `<span class="detail-tag price-tag">背面収納 ${d.backStorage.startsWith('¥')?d.backStorage:'¥'+backNum.toLocaleString()}</span>` : '';

    const oneroomTag = d.hasOneroom ? `<span class="detail-tag has-value">ワンルーム ${d.oneroom.replace(/\n/g,' / ')}</span>` : '';
    const garageTag  = d.hasGarage  ? `<span class="detail-tag has-value">ガレージ ${d.garage}</span>` : '';
    const wallTag    = d.wall       ? `<span class="detail-tag">外壁: ${d.wall}</span>` : '';
    const sizeTag    = `<span class="detail-tag">${d.size} ${d.floor}F</span>`;

    return `<div class="card" onclick="">
      <div class="card-header">
        <div class="card-name">${d.name}</div>
        <span class="style-tag style-${d.style}">${d.style}</span>
      </div>
      <div class="info-row">${sizeTag}${wallTag}</div>
      <div class="kitchen-block">
        <div class="kitchen-maker">${d.maker||'—'}</div>
        <div class="kitchen-name">${kitchenDisplay}</div>
        <div class="info-row" style="margin:4px 0 4px;">${makerBadge}${typeBadge}${noteBadge}</div>
        <div class="kitchen-price">${d.kitchenPrice && d.kitchenPrice !== '¥0' ? d.kitchenPrice : '標準仕様'}</div>
      </div>
      <div class="color-row">${colorDot}</div>
      ${(backTag||oneroomTag||garageTag) ? `<div class="detail-row">${backTag}${oneroomTag}${garageTag}</div>` : ''}
      ${(() => { const p = getPdfs(d.name); if (!p) return ''; const planBtn = p.plan ? `<a class="pdf-btn pdf-btn-plan" href="${driveUrl(p.plan)}" target="_blank">📄 キッチンプラン</a>` : ''; const storageBtn = p.storage ? `<a class="pdf-btn pdf-btn-storage" href="${driveUrl(p.storage)}" target="_blank">🗄 収納プラン</a>` : ''; return `<div class="pdf-links">${planBtn}${storageBtn}</div>`; })()}
    </div>`;
  }).join('');
}

// Init
buildFilters();
applyFilters();
</script>
</body>
</html>
